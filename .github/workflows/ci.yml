name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mrn
          POSTGRES_PASSWORD: Ping2012
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'bookshare-backend/pnpm-lock.yaml'

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: bookshare-backend

      - name: Lint backend
        run: pnpm run lint
        working-directory: bookshare-backend

      - name: Build backend
        run: pnpm run build
        working-directory: bookshare-backend

      - name: Run E2E tests
        run: pnpm run test:e2e
        working-directory: bookshare-backend
